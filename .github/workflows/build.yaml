name: ci

on:
  push:

env:
  IMAGE_NAME: user/app

jobs:
  container:
    runs-on: self-hosted
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.KEPPEL_REGISTRY }}
          username: ${{ vars.KEPPEL_USERNAME }}
          password: ${{ secrets.KEPPEL_SECRET }}

      - name: Check Podman version
        run: podman --version

   
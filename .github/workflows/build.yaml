name: ci

on:
  push:

env:
  IMAGE_NAME: user/app

jobs:
  container:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.KEPPEL_REGISTRY }}
          username: ${{ vars.KEPPEL_USERNAME }}
          password: ${{ secrets.KEPPEL_SECRET }}

      - name: Check Podman version
        run: podman --version
      
      - name: Build image
        run: docker build --label source_repository="c5413905/remotearbiter" -t keppel.eu-de-1.cloud.sap/ccloud/c5413905/remotearbiter:1234 .

   
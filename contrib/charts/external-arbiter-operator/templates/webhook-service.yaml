---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-webhook-service
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webhookService.type }}
  ports:
  - port: {{ .Values.webhookService.port }}
    protocol: TCP
    targetPort: 9443
  selector:
    control-plane: controller-manager
    {{- include "chart.labels" . | nindent 4 }}
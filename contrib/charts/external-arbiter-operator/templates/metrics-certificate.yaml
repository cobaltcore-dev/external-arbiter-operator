---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "chart.fullname" . }}-metrics-cert
  labels:
  {{- include "chart.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "chart.fullname" . }}-metrics-service.{{ .Release.Namespace }}.svc
    - {{ include "chart.fullname" . }}-metrics-service.{{ .Release.Namespace }}.svc.{{ .Values.cluster.domain }}
  issuerRef:
    kind: Issuer
    name: {{ include "chart.fullname" . }}-selfsigned-issuer
  secretName: {{ include "chart.fullname" . }}-metrics-server-cert
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "external-arbiter-operator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "external-arbiter-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        control-plane: controller-manager
        {{- include "external-arbiter-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: "{{ .Values.manager.image.pullPolicy }}"
          args:
            - --metrics-bind-address=:8443
            - --leader-elect
            - --health-probe-bind-address=:8081
            {{ if .Values.useCertManager }}
            - --metrics-cert-path=/tmp/k8s-metrics-server/metrics-certs
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            {{ end }}
          command:
            - /manager
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
          {{- toYaml .Values.manager.resources | nindent 12 }}
          securityContext:
          {{- toYaml .Values.manager.securityContext | nindent 12 }}
          {{ if .Values.useCertManager }}
          volumeMounts:
            - mountPath: /tmp/k8s-metrics-server/metrics-certs
              name: metrics-certs
              readOnly: true
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: webhook-certs
              readOnly: true
          {{ end }}
      securityContext:
      {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ .Release.Name }}-controller-manager
      terminationGracePeriodSeconds: 10
      {{ if .Values.useCertManager }}
      volumes:
        - name: metrics-certs
          secret:
            items:
            - key: ca.crt
              path: ca.crt
            - key: tls.crt
              path: tls.crt
            - key: tls.key
              path: tls.key
            optional: false
            secretName: {{ .Release.Name }}-metrics-server-cert
        - name: webhook-certs
          secret:
            secretName: {{ .Release.Name }}-webhook-server-cert
      {{ end }}

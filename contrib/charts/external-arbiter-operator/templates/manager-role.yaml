---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-manager-role
  labels:
    {{- include "external-arbiter-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
    - ""
  resources:
    - configmaps
    - configmaps/status
    - secrets
    - secrets/status
  verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
- apiGroups:
    - ""
  resources:
    - configmaps/finalizers
    - secrets/finalizers
  verbs:
    - update
- apiGroups:
    - apps
  resources:
    - deployments
    - deployments/status
  verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
- apiGroups:
    - apps
  resources:
    - deployments/finalizers
  verbs:
    - update
- apiGroups:
    - ceph.cobaltcore.sap.com
  resources:
    - remotearbiters
    - remoteclusters
  verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
- apiGroups:
    - ceph.cobaltcore.sap.com
  resources:
    - remotearbiters/finalizers
    - remoteclusters/finalizers
  verbs:
    - update
- apiGroups:
    - ceph.cobaltcore.sap.com
  resources:
    - remotearbiters/status
    - remoteclusters/status
  verbs:
    - get
    - patch
    - update
- apiGroups:
    - ceph.rook.io
  resources:
    - cephclusters
    - cephclusters/status
  verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
- apiGroups:
    - ceph.rook.io
  resources:
    - cephclusters/finalizers
  verbs:
    - update

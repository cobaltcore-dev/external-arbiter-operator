- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-ceph-cobaltcore-sap-com-v1alpha1-remotecluster
  failurePolicy: Fail
  name: vremotecluster-v1alpha1.kb.io
  rules:
  - apiGroups:
    - ceph.cobaltcore.sap.com
